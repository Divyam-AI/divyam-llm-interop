name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      test-pypi:
        description: "Publish to TestPyPI instead of PyPI"
        required: false
        type: boolean
        default: false

jobs:
  test:
    uses: ./.github/workflows/test.yml

  lint:
    uses: ./.github/workflows/lint.yml

  publish:
    environment: pypi
    runs-on: ubuntu-latest
    needs: [test, lint]

    if: >
      (github.event_name == 'push' && github.ref_protected == 'true') ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'create' && startsWith(github.ref, 'refs/tags/'))

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: snok/install-poetry@v1
        with:
          version: latest

      - name: Resolve publishable version
        id: resolve_version
        run: |
          set -euo pipefail

          PACKAGE_NAME=$(grep -E '^name = ' pyproject.toml | sed -E 's/name = "(.*)"/\1/')

          if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            poetry version "${GITHUB_REF#refs/tags/v}"
            PYPI_BASE="https://pypi.org/pypi"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.test-pypi }}" = "true" ]; then
            PYPI_BASE="https://test.pypi.org/pypi"
          else
            PYPI_BASE="https://pypi.org/pypi"
          fi

          MAX_ATTEMPTS=50
          attempt=0
          while [ "$attempt" -lt "$MAX_ATTEMPTS" ]; do
            VERSION=$(grep -E '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${PYPI_BASE}/${PACKAGE_NAME}/${VERSION}/json")
            if [ "$HTTP_CODE" = "404" ]; then
              echo "Version ${VERSION} is not published on ${PYPI_BASE}"
              break
            fi
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Version ${VERSION} already published; bumping patch"
              poetry version patch
              attempt=$((attempt + 1))
              continue
            fi
            echo "Unexpected HTTP ${HTTP_CODE} checking ${PYPI_BASE}/${PACKAGE_NAME}/${VERSION}"
            exit 1
          done

          if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
            echo "Could not find an unpublished version after ${MAX_ATTEMPTS} attempts"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "PUBLISH_VERSION=${VERSION}" >> "$GITHUB_ENV"
          grep -E '^version = ' pyproject.toml

      - name: Commit version bump to main
        if: >
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && inputs.test-pypi == false)
        run: |
          set -euo pipefail

          RESOLVED_VERSION="${{ steps.resolve_version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main

          poetry version "${RESOLVED_VERSION}"
          git add pyproject.toml

          if git diff --staged --quiet; then
            echo "main already at version ${RESOLVED_VERSION}"
          else
            git commit -m "chore: release version ${RESOLVED_VERSION}"
            git push origin main
          fi

      - name: Build distribution
        run: poetry build

      - name: Install Twine
        run: pip install twine

      - name: Validate distributions
        run: twine check dist/*

      - name: Publish to PyPI
        if: >
          (github.event_name == 'push' && github.ref_protected == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.test-pypi == false)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.test-pypi == true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

      - name: Upload release assets
        if: github.event_name == 'push' && github.ref_protected == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} (published ${{ env.PUBLISH_VERSION }})
          files: dist/*
          generate_release_notes: true
          body: |
            Published package version: **${{ env.PUBLISH_VERSION }}**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
